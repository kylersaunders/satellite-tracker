<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker - Live 3D View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #canvas-container {
            cursor: grab;
        }
        
        #canvas-container:active {
            cursor: grabbing;
        }
        
        #canvas-container.hovering {
            cursor: pointer;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 10px;
            color: #fff;
            max-width: 300px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 100;
        }
        
        #controls.collapsed {
            transform: translateX(-320px);
            opacity: 0;
            pointer-events: none;
        }

        #controls::-webkit-scrollbar {
            width: 8px;
        }

        #controls::-webkit-scrollbar-thumb {
            background: rgba(76, 175, 80, 0.5);
            border-radius: 999px;
        }
        
        #menu-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #4CAF50;
            color: #4CAF50;
            font-size: 24px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 101;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        #menu-toggle:active {
            transform: scale(0.95);
        }
        
        #controls h1 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #4CAF50;
        }
        
        #controls p {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .control-group {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }
        
        .control-group h3 {
            font-size: 14px;
            color: #4CAF50;
            margin-bottom: 8px;
        }
        
        .speed-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .speed-btn {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .speed-btn.active {
            background: #4CAF50;
            color: #000;
        }
        
        .speed-btn:hover {
            background: rgba(76, 175, 80, 0.4);
        }
        
        .toggle-option {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
        }
        
        .toggle-option input {
            margin-right: 8px;
        }
        
        .slider-control {
            margin: 10px 0;
        }
        
        .slider-control label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .slider-control input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(76, 175, 80, 0.3);
            outline: none;
            border-radius: 2px;
        }
        
        .slider-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4CAF50;
            cursor: pointer;
            border-radius: 50%;
        }
        
        .slider-control input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #4CAF50;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }
        
        .slider-value {
            display: inline-block;
            font-size: 11px;
            color: #4CAF50;
            margin-left: 5px;
        }
        
        #satellite-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            max-width: 350px;
            backdrop-filter: blur(10px);
            display: none;
            z-index: 99;
        }
        
        #satellite-info h3 {
            color: #4CAF50;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        #satellite-info .stat {
            font-size: 13px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        
        #satellite-info .label {
            opacity: 0.7;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-size: 18px;
            text-align: center;
            z-index: 1000;
        }
        
        .spinner {
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .satellite-category {
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 12px;
        }
        
        .satellite-category label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .satellite-category input {
            margin-right: 8px;
            cursor: pointer;
        }
        
        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
            box-shadow: 0 0 8px currentColor;
        }
        
        .count {
            margin-left: auto;
            opacity: 0.6;
            font-size: 11px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            #controls {
                max-width: 280px;
                left: 10px;
                top: 10px;
                padding: 15px;
            }
            
            #menu-toggle {
                right: 10px;
                top: 10px;
                font-size: 22px;
                padding: 10px 14px;
            }
            
            #controls.collapsed {
                transform: translateX(-300px);
            }
            
            #satellite-info {
                left: 10px;
                bottom: 10px;
                right: 10px;
                max-width: none;
            }
            
            #controls h1 {
                font-size: 18px;
            }
            
            #controls p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <button id="menu-toggle" aria-label="Toggle menu">☰</button>
    
    <div id="controls" class="collapsed">
        <h1>🛰️ Satellite Tracker</h1>
        <p><strong>Drag</strong> to rotate | <strong>Scroll</strong> to zoom | <strong>Tap</strong> satellite for info</p>
        <div id="satellite-count">Loading satellites...</div>
        
        <div class="control-group">
            <h3>⚡ Time Speed</h3>
            <div class="speed-buttons">
                <button class="speed-btn active" data-speed="1">1x Real</button>
                <button class="speed-btn" data-speed="10">10x</button>
                <button class="speed-btn" data-speed="100">100x</button>
                <button class="speed-btn" data-speed="1000">1000x</button>
            </div>
        </div>
        
        <div class="control-group">
            <h3>🎨 Display</h3>
            <div class="slider-control">
                <label>
                    Satellite Size <span class="slider-value" id="size-value">50%</span>
                </label>
                <input type="range" id="satellite-size" min="10" max="200" value="50" step="10">
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="show-orbits">
                <label for="show-orbits">Show Orbital Paths</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="show-moon" checked>
                <label for="show-moon">Show Moon</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="show-moon-orbit">
                <label for="show-moon-orbit">Show Moon Orbit</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="show-artemis" checked>
                <label for="show-artemis">Show Artemis II</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="show-artemis-path" checked>
                <label for="show-artemis-path">Show Artemis Path</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="deep-space-mode">
                <label for="deep-space-mode">Deep Space Focus</label>
            </div>
        </div>

        <div class="control-group">
            <h3>🌕 Artemis II</h3>
            <p style="font-size:12px;opacity:.85;margin-bottom:8px;">Approximate in-app free-return path + live external tracker links.</p>
            <div class="speed-buttons">
                <button class="speed-btn" id="open-arow">NASA Live</button>
                <button class="speed-btn" id="open-artemis-live">ArtemisLive</button>
            </div>
        </div>
        
        <div id="categories"></div>
    </div>
    
    <div id="satellite-info">
        <h3 id="sat-name">—</h3>
        <div class="stat">
            <span class="label">Altitude:</span>
            <span id="sat-altitude">—</span>
        </div>
        <div class="stat">
            <span class="label">Velocity:</span>
            <span id="sat-velocity">—</span>
        </div>
        <div class="stat">
            <span class="label">Latitude:</span>
            <span id="sat-lat">—</span>
        </div>
        <div class="stat">
            <span class="label">Longitude:</span>
            <span id="sat-lon">—</span>
        </div>
        <div class="stat">
            <span class="label">Period:</span>
            <span id="sat-period">—</span>
        </div>
    </div>
    
    <div id="loading">
        <div class="spinner"></div>
        Loading satellite data...
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Import satellite.js from CDN
        const satellite = await import('https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.es.js');
        
        // Menu toggle functionality
        const menuToggle = document.getElementById('menu-toggle');
        const controls = document.getElementById('controls');
        let menuOpen = false;
        
        menuToggle.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                controls.classList.remove('collapsed');
                menuToggle.classList.add('menu-open');
                menuToggle.textContent = '✕';
            } else {
                controls.classList.add('collapsed');
                menuToggle.classList.remove('menu-open');
                menuToggle.textContent = '☰';
            }
        });
        
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        camera.position.z = 15000;
        
        // Orbit controls
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.minDistance = 7000;
        orbitControls.maxDistance = 50000;
        
        // Earth
        const earthGeometry = new THREE.SphereGeometry(6371, 64, 64);
        const earthTexture = new THREE.TextureLoader().load(
            'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/earth-blue-marble.jpg'
        );
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthTexture,
            emissive: 0x112244,
            emissiveIntensity: 0.1
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Atmosphere glow
        const atmosphereGeometry = new THREE.SphereGeometry(6500, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x4444ff,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // Lighting
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(5, 3, 5).normalize();
        scene.add(sunLight);
        
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        
        // Stars background
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
        const starsVertices = [];
        for (let i = 0; i < 10000; i++) {
            const x = (Math.random() - 0.5) * 100000;
            const y = (Math.random() - 0.5) * 100000;
            const z = (Math.random() - 0.5) * 100000;
            starsVertices.push(x, y, z);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // Satellite data
        const satellites = [];
        const satelliteObjects = new THREE.Group();
        scene.add(satelliteObjects);
        
        const orbitalPaths = new THREE.Group();
        scene.add(orbitalPaths);

        const celestialObjects = new THREE.Group();
        scene.add(celestialObjects);
        
        let timeMultiplier = 1;
        let showOrbits = false;
        let simulationTime = new Date();
        
        let satelliteScale = 0.5; // Global size multiplier (default 50%)

        let showMoon = true;
        let showMoonOrbit = false;
        let showArtemis = true;
        let showArtemisPath = true;
        let deepSpaceMode = false;
        const moonDistanceKm = 384400;
        const moonRadiusKm = 1737;
        const moonOrbitTilt = THREE.MathUtils.degToRad(5.145);
        const deepSpaceCompression = 0.16;
        const artemisLaunchTime = new Date('2026-04-01T16:47:00Z');
        const artemisMissionDurationMs = 10 * 24 * 60 * 60 * 1000;
        
        const categories = {
            'ISS': { url: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle', color: 0x00ff00, emissive: 0x00ff00, visible: true, filterISS: true },
            'Starlink': { url: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle', color: 0xff3300, emissive: 0xff3300, visible: true },
            'GPS': { url: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=gps-ops&FORMAT=tle', color: 0x00ddff, emissive: 0x0088ff, visible: true },
            'Weather': { url: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle', color: 0xffff00, emissive: 0xffff00, visible: true },
            'Communications': { url: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle', color: 0xff00ff, emissive: 0xff00ff, visible: false, filterStarlink: true }
        };
        
        // Parse TLE data
        function parseTLE(tleString) {
            const lines = tleString.trim().split('\n');
            const sats = [];
            
            for (let i = 0; i < lines.length; i += 3) {
                if (i + 2 < lines.length) {
                    sats.push({
                        name: lines[i].trim(),
                        tle1: lines[i + 1].trim(),
                        tle2: lines[i + 2].trim()
                    });
                }
            }
            
            return sats;
        }
        
        function julianDate(date) {
            return date.getTime() / 86400000 + 2440587.5;
        }

        function compressDeepSpacePosition(vector) {
            return vector.clone().multiplyScalar(deepSpaceCompression);
        }

        function getMoonPosition(date) {
            const jd = julianDate(date);
            const d = jd - 2451543.5;

            const N = (125.1228 - 0.0529538083 * d) * Math.PI / 180;
            const i = 5.1454 * Math.PI / 180;
            const w = (318.0634 + 0.1643573223 * d) * Math.PI / 180;
            const a = 60.2666 * 6371;
            const e = 0.0549;
            const M = (115.3654 + 13.0649929509 * d) * Math.PI / 180;

            const E = M + e * Math.sin(M) * (1.0 + e * Math.cos(M));
            const xv = a * (Math.cos(E) - e);
            const yv = a * (Math.sqrt(1.0 - e * e) * Math.sin(E));

            const v = Math.atan2(yv, xv);
            const r = Math.sqrt(xv * xv + yv * yv);

            const xh = r * (Math.cos(N) * Math.cos(v + w) - Math.sin(N) * Math.sin(v + w) * Math.cos(i));
            const yh = r * (Math.sin(N) * Math.cos(v + w) + Math.cos(N) * Math.sin(v + w) * Math.cos(i));
            const zh = r * (Math.sin(v + w) * Math.sin(i));

            return compressDeepSpacePosition(new THREE.Vector3(xh, zh, yh));
        }

        function createMoonSystem() {
            const moonGeometry = new THREE.SphereGeometry(moonRadiusKm * 5.5, 24, 24);
            const moonMaterial = new THREE.MeshPhongMaterial({
                color: 0xd9d9d9,
                emissive: 0x222222,
                shininess: 8
            });
            const moonMesh = new THREE.Mesh(moonGeometry, moonMaterial);
            moonMesh.userData = { type: 'moon' };
            celestialObjects.add(moonMesh);

            const orbitPoints = [];
            const start = new Date();
            for (let day = 0; day <= 27; day++) {
                const t = new Date(start.getTime() + day * 24 * 60 * 60 * 1000);
                orbitPoints.push(getMoonPosition(t));
            }
            const moonOrbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
            const moonOrbitMaterial = new THREE.LineBasicMaterial({ color: 0x999999, transparent: true, opacity: 0.35 });
            const moonOrbitLine = new THREE.LineLoop(moonOrbitGeometry, moonOrbitMaterial);
            moonOrbitLine.visible = showMoonOrbit;
            celestialObjects.add(moonOrbitLine);

            return { moonMesh, moonOrbitLine };
        }

        const moonSystem = createMoonSystem();

        function artemisProgress(date) {
            return Math.max(0, Math.min(1, (date.getTime() - artemisLaunchTime.getTime()) / artemisMissionDurationMs));
        }

        function getArtemisPosition(date) {
            const p = artemisProgress(date);
            const moonPos = getMoonPosition(date);
            const moonDir = moonPos.clone().normalize();
            const earthOrbitRadius = 6671;

            if (p <= 0.18) {
                return moonDir.clone().multiplyScalar(earthOrbitRadius + p / 0.18 * 120000);
            }
            if (p <= 0.45) {
                const t = (p - 0.18) / 0.27;
                return moonDir.clone().multiplyScalar(120000 + t * 280000);
            }
            if (p <= 0.6) {
                const t = (p - 0.45) / 0.15;
                const lateral = new THREE.Vector3(-moonDir.z, moonDir.y * 0.2, moonDir.x).normalize();
                return moonPos.clone().multiplyScalar(0.82 + t * 0.16).add(lateral.multiplyScalar(Math.sin(t * Math.PI) * 35000));
            }
            const t = (p - 0.6) / 0.4;
            return moonDir.clone().multiplyScalar((1 - t) * 280000 + t * earthOrbitRadius);
        }

        function createArtemisSystem() {
            const geometry = new THREE.SphereGeometry(85, 12, 12);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData = { type: 'artemis' };
            celestialObjects.add(mesh);

            const points = [];
            for (let hour = 0; hour <= 240; hour += 4) {
                const t = new Date(artemisLaunchTime.getTime() + hour * 60 * 60 * 1000);
                points.push(getArtemisPosition(t));
            }
            const pathGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const pathMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.9, linewidth: 3 });
            const pathLine = new THREE.Line(pathGeometry, pathMaterial);
            celestialObjects.add(pathLine);

            return { mesh, pathLine };
        }

        const artemisSystem = createArtemisSystem();

        // Fetch satellites from CelesTrak
        async function loadSatellites() {
            let totalLoaded = 0;
            
            for (const [category, config] of Object.entries(categories)) {
                try {
                    const response = await fetch(config.url);
                    const tleData = await response.text();
                    const sats = parseTLE(tleData);
                    
                    let categoryCount = 0;
                    
                    for (let i = 0; i < sats.length; i++) {
                        const sat = sats[i];
                        
                        // Filter for ISS only if filterISS flag is set
                        if (config.filterISS && !sat.name.includes('ISS (ZARYA)')) {
                            continue;
                        }
                        
                        // Filter out Starlink from Communications category
                        if (config.filterStarlink && sat.name.toUpperCase().includes('STARLINK')) {
                            continue;
                        }
                        
                        const satrec = satellite.twoline2satrec(sat.tle1, sat.tle2);
                        
                        // Smaller base sizes (ISS is special, others are small)
                        const baseSize = category === 'ISS' ? 100 : 30;
                        const geometry = new THREE.SphereGeometry(baseSize, 8, 8);
                        
                        // Create material with proper color - fix color initialization bug
                        const satColor = new THREE.Color(config.color);
                        const material = new THREE.MeshBasicMaterial({ 
                            color: satColor.clone()
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        
                        // Create orbital path (hidden by default)
                        const orbitPoints = [];
                        const now = new Date();
                        
                        // Calculate orbit points (1 full orbit, 90 points)
                        const period = satrec.no ? (2 * Math.PI / satrec.no) : 90; // period in minutes
                        const steps = 90;
                        
                        for (let step = 0; step < steps; step++) {
                            const timeOffset = (period / steps) * step;
                            const futureTime = new Date(now.getTime() + timeOffset * 60000);
                            const pv = satellite.propagate(satrec, futureTime);
                            
                            if (pv.position && !pv.position.error) {
                                orbitPoints.push(new THREE.Vector3(
                                    pv.position.x,
                                    pv.position.y,
                                    pv.position.z
                                ));
                            }
                        }
                        
                        // Close the orbit loop
                        if (orbitPoints.length > 0) {
                            orbitPoints.push(orbitPoints[0].clone());
                        }
                        
                        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
                        const orbitMaterial = new THREE.LineBasicMaterial({ 
                            color: satColor.clone(),
                            transparent: true,
                            opacity: 0.3
                        });
                        const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
                        orbitLine.visible = false;
                        orbitalPaths.add(orbitLine);
                        
                        satellites.push({
                            name: sat.name,
                            satrec: satrec,
                            mesh: mesh,
                            orbitLine: orbitLine,
                            category: category,
                            color: config.color
                        });
                        
                        satelliteObjects.add(mesh);
                        categoryCount++;
                    }
                    
                    config.count = categoryCount;
                    totalLoaded += categoryCount;
                    
                } catch (error) {
                    console.error(`Failed to load ${category}:`, error);
                    config.count = 0;
                }
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('satellite-count').innerHTML = `<strong>${totalLoaded}</strong> satellites tracked`;
            
            renderCategories();
        }
        
        // Render category checkboxes
        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = '';
            
            for (const [name, config] of Object.entries(categories)) {
                const div = document.createElement('div');
                div.className = 'satellite-category';
                
                // Convert hex color to CSS
                const colorHex = '#' + config.color.toString(16).padStart(6, '0');
                
                div.innerHTML = `
                    <label>
                        <input type="checkbox" ${config.visible ? 'checked' : ''} data-category="${name}">
                        <span class="color-indicator" style="background-color: ${colorHex}; color: ${colorHex};"></span>
                        <span>${name}</span>
                        <span class="count">${config.count || 0}</span>
                    </label>
                `;
                
                div.querySelector('input').addEventListener('change', (e) => {
                    config.visible = e.target.checked;
                    updateSatelliteVisibility();
                });
                
                container.appendChild(div);
            }
        }
        
        // Update satellite visibility
        function updateSatelliteVisibility() {
            satellites.forEach(sat => {
                sat.mesh.visible = categories[sat.category].visible;
                // Ensure color is correct when toggling visibility
                if (sat.mesh.visible && sat.mesh.userData.categoryColor) {
                    sat.mesh.material.color.setHex(sat.mesh.userData.categoryColor);
                }
            });
        }
        
        // Update satellite positions
        function updateSatellites(deltaTime) {
            // Advance simulation time based on multiplier
            simulationTime = new Date(simulationTime.getTime() + deltaTime * timeMultiplier);
            
            const cameraDistance = camera.position.length();
            
            // Scale satellites based on camera distance for better visibility
            const distanceScale = Math.max(1.0, cameraDistance / 15000);
            
            satellites.forEach(sat => {
                const positionAndVelocity = satellite.propagate(sat.satrec, simulationTime);
                
                if (positionAndVelocity.position && !positionAndVelocity.position.error) {
                    const pos = positionAndVelocity.position;
                    sat.mesh.position.set(pos.x, pos.y, pos.z);
                    sat.position = pos;
                    sat.velocity = positionAndVelocity.velocity;
                    
                    // Apply both user scale and distance scale
                    const finalScale = distanceScale * satelliteScale;
                    sat.mesh.scale.setScalar(finalScale);
                }
                
                // Update orbit visibility
                if (sat.orbitLine) {
                    sat.orbitLine.visible = showOrbits && sat.mesh.visible;
                }
            });
        }
        
        // Raycaster for clicking satellites
        const raycaster = new THREE.Raycaster();
        // Increase raycaster threshold for easier mobile clicking
        raycaster.params.Points.threshold = 100;
        const mouse = new THREE.Vector2();
        const canvasContainer = document.getElementById('canvas-container');
        
        function updatePointer(event) {
            // Handle both mouse and touch events
            const x = event.clientX || (event.touches && event.touches[0].clientX);
            const y = event.clientY || (event.touches && event.touches[0].clientY);
            
            if (x === undefined || y === undefined) return;
            
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const visibleSatellites = satellites
                .filter(sat => sat.mesh.visible)
                .map(sat => sat.mesh);
            
            const intersects = raycaster.intersectObjects(visibleSatellites);
            
            // Update cursor
            if (intersects.length > 0) {
                canvasContainer.classList.add('hovering');
                return intersects[0];
            } else {
                canvasContainer.classList.remove('hovering');
                return null;
            }
        }
        
        function onPointerDown(event) {
            const intersect = updatePointer(event);
            
            if (intersect) {
                if (intersect.object.userData?.type === 'moon') {
                    showMoonInfo();
                    return;
                }
                if (intersect.object.userData?.type === 'artemis') {
                    showArtemisInfo();
                    return;
                }
                const sat = satellites.find(s => s.mesh === intersect.object);
                showSatelliteInfo(sat);
            } else {
                document.getElementById('satellite-info').style.display = 'none';
            }
        }
        
        function onPointerMove(event) {
            updatePointer(event);
        }
        
        renderer.domElement.addEventListener('click', onPointerDown);
        renderer.domElement.addEventListener('touchstart', onPointerDown);
        renderer.domElement.addEventListener('mousemove', onPointerMove);
        
        function showArtemisInfo() {
            const info = document.getElementById('satellite-info');
            const pos = getArtemisPosition(simulationTime);
            const distance = Math.round(pos.length() / deepSpaceCompression);
            const moonDistance = Math.round(pos.distanceTo(getMoonPosition(simulationTime)) / deepSpaceCompression);
            document.getElementById('sat-name').textContent = 'Artemis II / Orion';
            document.getElementById('sat-altitude').textContent = `${distance.toLocaleString()} km from Earth`;
            document.getElementById('sat-velocity').textContent = 'Approx mission path';
            document.getElementById('sat-lat').textContent = `${moonDistance.toLocaleString()} km to Moon`;
            document.getElementById('sat-lon').textContent = `${Math.round(artemisProgress(simulationTime) * 100)}% mission elapsed`;
            document.getElementById('sat-period').textContent = '~10 day free-return';
            info.style.display = 'block';
        }

        function showMoonInfo() {
            const info = document.getElementById('satellite-info');
            const moonPos = getMoonPosition(simulationTime);
            const distance = Math.round(moonPos.length() / deepSpaceCompression);
            document.getElementById('sat-name').textContent = 'Moon';
            document.getElementById('sat-altitude').textContent = `${distance.toLocaleString()} km`;
            document.getElementById('sat-velocity').textContent = '~3,683 km/h';
            document.getElementById('sat-lat').textContent = 'Orbital body';
            document.getElementById('sat-lon').textContent = 'Earth-centered';
            document.getElementById('sat-period').textContent = '~27.3 days';
            info.style.display = 'block';
        }

        // Show satellite info
        function showSatelliteInfo(sat) {
            const info = document.getElementById('satellite-info');
            const now = new Date();
            const gmst = satellite.gstime(now);
            const positionGd = satellite.eciToGeodetic(sat.position, gmst);
            
            const altitude = Math.round(positionGd.height);
            const lat = (positionGd.latitude * 180 / Math.PI).toFixed(2);
            const lon = (positionGd.longitude * 180 / Math.PI).toFixed(2);
            
            let velocity = 0;
            if (sat.velocity) {
                velocity = Math.sqrt(
                    sat.velocity.x ** 2 + 
                    sat.velocity.y ** 2 + 
                    sat.velocity.z ** 2
                );
            }
            
            const period = sat.satrec.no ? (2 * Math.PI / sat.satrec.no) : 0;
            
            document.getElementById('sat-name').textContent = sat.name;
            document.getElementById('sat-altitude').textContent = `${altitude} km`;
            document.getElementById('sat-velocity').textContent = `${Math.round(velocity * 3600)} km/h`;
            document.getElementById('sat-lat').textContent = `${lat}°`;
            document.getElementById('sat-lon').textContent = `${lon}°`;
            document.getElementById('sat-period').textContent = `${Math.round(period)} min`;
            
            info.style.display = 'block';
        }
        
        // Animation loop
        let lastTime = Date.now();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const now = Date.now();
            const deltaTime = now - lastTime;
            lastTime = now;
            
            earth.rotation.y += 0.0001;
            atmosphere.rotation.y += 0.0001;

            moonSystem.moonMesh.position.copy(getMoonPosition(simulationTime));
            moonSystem.moonMesh.visible = showMoon;
            moonSystem.moonOrbitLine.visible = showMoonOrbit;
            artemisSystem.mesh.position.copy(getArtemisPosition(simulationTime));
            artemisSystem.mesh.visible = showArtemis;
            artemisSystem.pathLine.visible = showArtemisPath;
            
            updateSatellites(deltaTime);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        
        function updateCameraMode() {
            if (deepSpaceMode) {
                camera.position.set(0, 90000, 160000);
                orbitControls.minDistance = 20000;
                orbitControls.maxDistance = 500000;
                orbitControls.target.set(0, 0, 0);
            } else {
                camera.position.set(0, 15000, 25000);
                orbitControls.minDistance = 7000;
                orbitControls.maxDistance = 100000;
                orbitControls.target.set(0, 0, 0);
            }
            orbitControls.update();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Speed control buttons
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeMultiplier = parseFloat(btn.dataset.speed);
                
                // Reset simulation time to current when changing speed
                simulationTime = new Date();
            });
        });
        
        // Size slider
        document.getElementById('satellite-size').addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            satelliteScale = value / 100; // Convert percentage to decimal
            document.getElementById('size-value').textContent = value + '%';
        });
        
        // Orbit toggle
        document.getElementById('show-orbits').addEventListener('change', (e) => {
            showOrbits = e.target.checked;
        });
        document.getElementById('show-moon').addEventListener('change', (e) => {
            showMoon = e.target.checked;
        });
        document.getElementById('show-moon-orbit').addEventListener('change', (e) => {
            showMoonOrbit = e.target.checked;
        });
        document.getElementById('show-artemis').addEventListener('change', (e) => {
            showArtemis = e.target.checked;
        });
        document.getElementById('show-artemis-path').addEventListener('change', (e) => {
            showArtemisPath = e.target.checked;
        });
        document.getElementById('deep-space-mode').addEventListener('change', (e) => {
            deepSpaceMode = e.target.checked;
            updateCameraMode();
        });
        document.getElementById('open-arow').addEventListener('click', () => {
            window.open('https://www.nasa.gov/trackartemis', '_blank');
        });
        document.getElementById('open-artemis-live').addEventListener('click', () => {
            window.open('https://artemislive.org/', '_blank');
        });
        
        // Initialize
        await loadSatellites();
        updateCameraMode();
        animate();
    </script>
</body>
</html>
